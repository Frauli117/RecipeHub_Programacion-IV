# Configuración de Nginx de referencia para RecipeHub.
# Ubicación en el VPS: /etc/nginx/sites-available/recipehub
#
# NOTA: Los bloques server :443 con SSL y la redirección 301 normalmente
# los agrega Certbot automáticamente al ejecutar:
#   sudo certbot --nginx -d api.recipehubb.xyz -d app.recipehubb.xyz
# Este archivo documenta el resultado esperado de esa configuración.

# ---------- Redirección HTTP (80) -> HTTPS (301), ambos subdominios ----------
server {
    listen 80;
    listen [::]:80;
    server_name api.recipehubb.xyz app.recipehubb.xyz;

    return 301 https://$host$request_uri;
}

# ---------- API: api.recipehubb.xyz -> proxy a Express (4000) ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.recipehubb.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.recipehubb.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.recipehubb.xyz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Frontend: app.recipehubb.xyz -> sirve el build estático ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.recipehubb.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.recipehubb.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.recipehubb.xyz/privkey.pem;

    root  /home/ubuntu/recipehub/frontend/dist;
    index index.html;

    # SPA routing: cualquier ruta cae en index.html para que React Router maneje
    # las recargas en rutas profundas (ej. /recetas/123, /perfil).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
